services:
  - type: web
    name: supro-api
    env: node
    rootDir: apps/server
    buildCommand: npm install
    startCommand: node src/app.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: supro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: FRONTEND_URL
        value: https://your-app.vercel.app  # update after Vercel deploy

databases:
  - name: supro-db
    plan: free
    databaseName: supro_db
    user: supro